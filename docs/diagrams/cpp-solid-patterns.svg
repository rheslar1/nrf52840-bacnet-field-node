    <line x1="220" y1="440" x2="220" y2="490" stroke="#60a5fa" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="660" y1="265" x2="590" y2="340" stroke="#be185d" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="560" y1="440" x2="560" y2="490" stroke="#fb7185" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="760" y1="265" x2="880" y2="340" stroke="#15803d" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="840" y1="245" x2="1160" y2="340" stroke="#6d28d9" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="760" y1="265" x2="900" y2="540" stroke="#4d7c0f" stroke-width="5" marker-end="url(#arrow)"/>
