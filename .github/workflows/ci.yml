name: CI

on:
  push:
  pull_request:

jobs:
  build-test-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure C++17 build
        run: cmake -S . -B build -DNRF_FIELD_NODE_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Run CTest
        run: ctest --test-dir build --output-on-failure

      - name: CLI status smoke test
        run: ./build/nrf52840_bacnet_field_node --status

      - name: CLI BACnet map smoke test
        run: ./build/nrf52840_bacnet_field_node --objects
